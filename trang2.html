<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng bà nha</title>
    <link rel="icon" href="img/icon.png">
    <link rel="stylesheet" href="effect.css">
</head>
<body style="background-image: url('img/back2.png') ; background-repeat: no-repeat; background-size: cover;background-position: center; height: 100vh; margin: 0; overflow: hidden;">
    <audio id="bg-audio" loop autoplay>
        <source src="img/audio.mp3" type="audio/mpeg">
    </audio>

    <script>
        window.onload = function() {
            var audio = document.getElementById("bg-audio");
            var playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(function() {
                }).catch(function(error) {
                    document.body.addEventListener("click", function() {
                        audio.play();
                    }, { once: true }); 
                });
            }
        };
    </script>
    <div class="frameanh">
        <a href="trang2.html"><img src="img/linh-hbd.jpg"></a>
    </div>
     
</body>
</html>
